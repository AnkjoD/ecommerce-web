services:
  db:
    image: pgvector/pgvector:pg17
    container_name: web-ban-hang-db
    restart: always
    profiles: ["infra", "dev", "full"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: web-ban-hang-redis
    restart: always
    profiles: ["infra", "dev", "full"]
    ports:
      - "6379:6379"
    networks:
      - app-network

  adminer:
    image: adminer:latest
    container_name: web-ban-hang-adminer
    restart: always
    profiles: ["infra", "dev", "full"]
    ports:
      - "8080:8080"
    networks:
      - app-network

  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: web-ban-hang-ai
    restart: always
    profiles: ["dev", "full"]
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"   # FastAPI
      - "8501:8501"   # Streamlit demo
    environment:
      DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      LLM_MODEL: ${LLM_MODEL}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      TOP_K_CONTEXT: ${TOP_K_CONTEXT}
      CHAT_HISTORY_LIMIT: ${CHAT_HISTORY_LIMIT}
    networks:
      - app-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: web-ban-hang-server
    restart: always
    profiles: ["dev", "full"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "4000:4000"
    volumes:
      - ./server:/app
      - /app/node_modules
    env_file:
      - ./server/.env
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public"
      REDIS_URI: "redis://redis:6379"
    networks:
      - app-network

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: web-ban-hang-admin
    restart: always
    profiles: ["full"]
    ports:
      - "8081:8080"
    depends_on:
      - server
    volumes:
      - ./admin:/app
      - /app/node_modules
    networks:
      - app-network
    environment:
      - VITE_PROXY_TARGET=http://server:4000

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: web-ban-hang-client
    restart: always
    profiles: ["full"]
    ports:
      - "3000:3000"
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - app-network
    environment:
      - VITE_PROXY_TARGET=http://server:4000

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
